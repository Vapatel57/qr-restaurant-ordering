<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Profile | QR-Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body class="bg-gray-100 font-sans">

<div class="flex min-h-screen">

    <!-- MOBILE OVERLAY -->
    <div id="sidebar-overlay"
         class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"
         onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar"
           class="fixed md:static inset-y-0 left-0 w-64 bg-gray-900 text-white transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-50">
        {% include "partials/admin_sidebar.html" %}
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 w-full overflow-y-auto">

        <!-- HEADER -->
        <header class="bg-white shadow-sm px-4 sm:px-6 py-4 flex items-center justify-between">

            <!-- Hamburger (Mobile Only) -->
            <button onclick="toggleSidebar()"
                    class="md:hidden text-gray-700 text-xl">
                <i class="fas fa-bars"></i>
            </button>

            <h2 class="text-lg sm:text-xl font-bold text-gray-800">
                Restaurant Profile
            </h2>

            <div></div> <!-- spacing fix -->

        </header>

        <!-- CONTENT -->
        <div class="px-4 sm:px-6 py-6 max-w-4xl mx-auto">

            <div class="bg-white rounded-xl shadow p-5 sm:p-6">

                <h3 class="text-base sm:text-lg font-semibold mb-6">
                    Restaurant Details
                </h3>

                <form method="POST" class="space-y-5 w-full">

                    <div>
                        <label class="block text-sm font-semibold mb-1">
                            Restaurant Name
                        </label>
                        <input name="name"
                               value="{{ restaurant.name }}"
                               class="w-full border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none px-4 py-2.5 rounded-lg"
                               required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">
                            GSTIN
                        </label>
                        <input name="gstin"
                               value="{{ restaurant.gstin }}"
                               class="w-full border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none px-4 py-2.5 rounded-lg">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">
                            Contact Number
                        </label>
                        <input name="phone"
                               value="{{ restaurant.phone }}"
                               class="w-full border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none px-4 py-2.5 rounded-lg">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">
                            Address
                        </label>
                        <textarea name="address"
                                  rows="3"
                                  class="w-full border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none px-4 py-2.5 rounded-lg resize-none">{{ restaurant.address }}</textarea>
                    </div>

                    <div class="pt-2">
                        <button
                            class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 transition text-white px-6 py-3 rounded-lg font-semibold shadow-sm">
                            Save Changes
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </main>
</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebar-overlay");

    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");
}
</script>

</body>
</html>
