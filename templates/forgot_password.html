<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | QR-Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-emerald-600 via-emerald-500 to-teal-500 flex items-center justify-center px-4">

    <!-- Card -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

        <!-- Logo / Title -->
        <div class="text-center mb-6">
            <h2 class="text-3xl font-black text-gray-800">
                Reset Password
            </h2>
            <p class="text-sm text-gray-500 mt-2">
                Enter your registered email and we’ll send reset instructions.
            </p>
        </div>

        <!-- Success Message -->
        {% if message %}
        <div class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm font-medium p-3 rounded-lg mb-4 text-center">
            {{ message }}
        </div>
        {% endif %}

        <!-- Error Message -->
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm font-medium p-3 rounded-lg mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" class="space-y-5">

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">
                    Email Address
                </label>

                <input
                    name="email"
                    type="email"
                    required
                    placeholder="you@example.com"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300
                           focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500
                           outline-none transition"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-[0.98]
                       text-white py-3 rounded-xl font-bold shadow-md
                       transition duration-200"
            >
                Send Reset Link
            </button>

        </form>

        <!-- Footer -->
        <div class="text-center mt-6 text-sm">
            <a href="/login"
               class="text-emerald-700 font-semibold hover:underline">
                ← Back to Login
            </a>
        </div>

    </div>

</body>
</html>
