<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Menu Management | QR-Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  />

  <style>
    .category-tab {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      background-color: #f3f4f6;
      font-weight: 600;
      font-size: 0.875rem;
      color: #374151;
      transition: all 0.2s ease;
    }

    .category-tab:hover {
      background-color: #e5e7eb;
    }

    .active-tab {
      background-color: #10b981;
      color: white;
    }

    .sidebar-item:hover {
      background-color: #374151;
    }

    .active-nav {
      border-left: 4px solid #10b981;
      background-color: #374151;
    }

    .template-btn {
      background-color: #e5e7eb;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.875rem;
      transition: 0.2s;
    }

    .template-btn:hover {
      background-color: #d1d5db;
    }
  </style>
</head>

<body class="bg-gray-50 overflow-x-hidden">

<div class="flex min-h-screen">

  <!-- MOBILE OVERLAY -->
  <div id="sidebar-overlay"
       onclick="toggleSidebar()"
       class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar"
    class="fixed md:static inset-y-0 left-0 w-64 bg-gray-900 text-white transform -translate-x-full md:translate-x-0 transition duration-200 z-50 flex flex-col">

    <div class="p-6 text-2xl font-bold border-b border-gray-800 flex items-center gap-2">
      <span class="text-emerald-500"><i class="fas fa-utensils"></i></span>
      QR-Order
    </div>

    <nav class="flex-1 mt-4 text-sm">
      <a href="/admin" class="sidebar-item flex items-center py-3 px-6">
        <i class="fas fa-chart-line mr-3"></i> Dashboard
      </a>

      <a href="/menu" class="sidebar-item active-nav flex items-center py-3 px-6">
        <i class="fas fa-hamburger mr-3"></i> Manage Menu
      </a>

      <a href="/admin/qr" class="sidebar-item flex items-center py-3 px-6">
        <i class="fas fa-th-large mr-3"></i> Tables & QRs
      </a>

      <a href="/admin/kitchen-users" class="sidebar-item flex items-center py-3 px-6">
        <i class="fas fa-utensils mr-3"></i> Kitchen Users
      </a>

      <a href="/admin/profile" class="sidebar-item flex items-center py-3 px-6">
        <i class="fas fa-user mr-3"></i> Profile
      </a>
    </nav>

    <div class="p-4 border-t border-gray-800">
      <a href="/logout"
         class="block w-full text-center bg-red-600 hover:bg-red-700 py-2.5 rounded-lg font-semibold">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 w-full overflow-y-auto">

    <!-- HEADER -->
    <header class="bg-white shadow-sm px-4 sm:px-6 py-4 flex items-center justify-between sticky top-0 z-30">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="md:hidden text-2xl">
          <i class="fas fa-bars"></i>
        </button>
        <h2 class="text-lg sm:text-2xl font-bold">Menu Management</h2>
      </div>

      <button onclick="openAddModal()"
              class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 sm:px-6 py-2.5 rounded-lg text-sm sm:text-base">
        <i class="fas fa-plus"></i> Add Dish
      </button>
    </header>

    <div class="px-4 sm:px-6 py-6 max-w-7xl mx-auto">

      <!-- CATEGORY TABS (Scrollable on mobile) -->
      <div class="flex gap-2 overflow-x-auto pb-2 mb-6" id="categoryTabs">
        <button onclick="setCategory(this, '')" class="category-tab active-tab whitespace-nowrap">All</button>
        <button onclick="setCategory(this, 'Starters')" class="category-tab whitespace-nowrap">Starters</button>
        <button onclick="setCategory(this, 'Main Course')" class="category-tab whitespace-nowrap">Main Course</button>
        <button onclick="setCategory(this, 'Beverages')" class="category-tab whitespace-nowrap">Beverages</button>
      </div>

      <!-- QUICK TEMPLATES -->
      <div class="bg-white p-5 rounded-xl shadow mb-6">
        <h3 class="font-bold text-lg mb-2">⚡ Quick Menu Templates</h3>

        <div class="flex flex-wrap gap-3">
          <button onclick="importTemplate('punjabi')" class="template-btn">Punjabi</button>
          <button onclick="importTemplate('gujarati')" class="template-btn">Gujarati</button>
          <button onclick="importTemplate('south_indian')" class="template-btn">South Indian</button>
          <button onclick="importTemplate('chinese')" class="template-btn">Chinese</button>
          <button onclick="importTemplate('pizza')" class="template-btn">Pizza / Cafe</button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="mb-6">
        <input
          id="menuSearch"
          type="text"
          placeholder="Search dish..."
          class="w-full border px-4 py-3 rounded-lg"
          oninput="applyFilters()" />
      </div>

      <!-- MENU GRID -->
      <div id="menu-grid"
           class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      </div>

    </div>
  </main>
</div>

  <!-- JS -->
  <script src="{{ url_for('static', filename='js/menu.js') }}"></script>
</body>
</html>
