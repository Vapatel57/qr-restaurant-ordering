<!DOCTYPE html>
<html>
<head>
    <title>Auto QR Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gray-100 font-sans">

<div class="flex min-h-screen">

    <!-- MOBILE OVERLAY -->
    <div id="sidebar-overlay"
         onclick="toggleSidebar()"
         class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar"
           class="fixed md:static inset-y-0 left-0 w-64 bg-gray-900 text-white
                  transform -translate-x-full md:translate-x-0
                  transition duration-200 z-50 flex flex-col">

        <div class="p-6 text-2xl font-bold border-b border-gray-800 flex items-center gap-2">
            <span class="text-emerald-500">
                <i class="fas fa-utensils"></i>
            </span>
            QR-Order
        </div>

        <nav class="flex-1 mt-4">
            <a href="/admin" class="flex items-center py-3 px-6 hover:bg-gray-800">
                <i class="fas fa-chart-line mr-3"></i> Dashboard
            </a>

            <a href="/menu" class="flex items-center py-3 px-6 hover:bg-gray-800">
                <i class="fas fa-hamburger mr-3"></i> Manage Menu
            </a>

            <a href="/admin/qr"
               class="flex items-center py-3 px-6 bg-gray-700 border-l-4 border-emerald-500">
                <i class="fas fa-th-large mr-3"></i> Tables & QRs
            </a>

            <a href="/admin/kitchen-users"
               class="flex items-center py-3 px-6 hover:bg-gray-800">
                <i class="fas fa-utensils mr-3"></i> Kitchen Users
            </a>

            <a href="/admin/profile"
               class="flex items-center py-3 px-6 hover:bg-gray-800">
                <i class="fas fa-user mr-3"></i> Profile
            </a>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <a href="/logout"
               class="block w-full text-center bg-red-600 hover:bg-red-700 py-2 rounded-lg">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-4 sm:p-8">

        <!-- MOBILE HEADER -->
        <div class="md:hidden mb-4">
            <button onclick="toggleSidebar()" class="text-2xl">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div class="bg-white p-6 sm:p-10 rounded-xl shadow-lg max-w-2xl mx-auto">

            <h2 class="text-2xl font-bold mb-4 text-center">
                Auto Generate Table QRs
            </h2>

            <p class="text-sm text-gray-500 text-center mb-6">
                Enter number of tables and download ready-to-print QR codes.
            </p>

            <input
                id="tables"
                type="number"
                min="1"
                placeholder="Enter number of tables"
                class="border p-3 w-full rounded mb-4 focus:ring-2 focus:ring-emerald-500 outline-none"
            >

            <button id="generateBtn"
                onclick="generateQRs()"
                class="bg-emerald-600 hover:bg-emerald-700 text-white py-3 w-full rounded font-bold transition">
                Generate QR Codes
            </button>

            <!-- LOADING -->
            <div id="loading"
                 class="hidden mt-4 text-center text-emerald-600 font-semibold">
                Generating QR codes...
            </div>

            <!-- RESULT -->
            <div id="result"
                 class="hidden mt-6 text-center">

                <p class="text-green-600 font-semibold mb-3">
                    QR Codes Generated Successfully 🎉
                </p>

                <a id="zipLink"
                   class="text-blue-600 underline font-medium"
                   download>
                    Download All QRs (ZIP)
                </a>
            </div>

            <!-- ERROR -->
            <div id="error"
                 class="hidden mt-4 text-center text-red-600 font-semibold">
            </div>

        </div>

    </main>
</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar")
        .classList.toggle("-translate-x-full");

    document.getElementById("sidebar-overlay")
        .classList.toggle("hidden");
}

async function generateQRs() {

    const tables = document.getElementById("tables").value;
    const btn = document.getElementById("generateBtn");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    const error = document.getElementById("error");

    result.classList.add("hidden");
    error.classList.add("hidden");

    if (!tables || tables < 1) {
        error.innerText = "Please enter a valid number of tables.";
        error.classList.remove("hidden");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Generating...";
    loading.classList.remove("hidden");

    try {
        const res = await fetch("/admin/qr/auto", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "table_count=" + tables
        });

        const data = await res.json();

        if (!data.zip) throw new Error();

        document.getElementById("zipLink").href = data.zip;
        result.classList.remove("hidden");

    } catch {
        error.innerText = "Failed to generate QR codes.";
        error.classList.remove("hidden");
    }

    btn.disabled = false;
    btn.innerText = "Generate QR Codes";
    loading.classList.add("hidden");
}
</script>

</body>
</html>
