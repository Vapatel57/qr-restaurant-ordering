<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-emerald-600 to-teal-500 flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

<h2 class="text-2xl font-black text-center mb-4">
Verify OTP
</h2>

<p class="text-sm text-gray-500 text-center mb-6">
Enter the 6-digit code sent to your email
</p>

{% if error %}
<div class="bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-lg mb-4 text-center">
{{ error }}
</div>
{% endif %}

<form method="POST" class="space-y-4">
<input name="otp"
       maxlength="6"
       required
       placeholder="------"
       class="w-full px-4 py-3 text-center text-2xl tracking-widest border rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">

<button type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold">
Verify
</button>
</form>

</div>
</body>
</html>
