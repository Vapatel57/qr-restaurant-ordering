<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Restaurant Account | QR-Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl p-6 sm:p-10">

    <!-- HEADER -->
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-gray-900">
            Launch Your Restaurant 🚀
        </h2>
        <p class="text-gray-500 mt-2 text-sm">
            Set up your QR ordering system in 60 seconds
        </p>
    </div>

    <!-- ERROR -->
    {% if error %}
    <div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm font-semibold text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-6">

        <!-- RESTAURANT SECTION -->
        <div>
            <h3 class="text-lg font-bold text-gray-800 mb-4">
                Restaurant Details
            </h3>

            <div class="space-y-4">
                <input name="restaurant_name" required
                       placeholder="Restaurant Name"
                       class="w-full border px-4 py-3 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">

                <!-- Subdomain with suffix -->
                <div class="flex">
                    <input name="subdomain" required
                           placeholder="yourname"
                           class="w-full border px-4 py-3 rounded-l-xl focus:ring-2 focus:ring-emerald-500 outline-none border-r-0">

                    <div class="bg-gray-100 px-4 py-3 rounded-r-xl text-sm text-gray-600 border">
                        .qrorder.com
                    </div>
                </div>

                <div class="grid sm:grid-cols-2 gap-4">
                    <input name="gstin"
                           placeholder="GSTIN (Optional)"
                           class="border px-4 py-3 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">

                    <input name="phone"
                           placeholder="Contact Number"
                           class="border px-4 py-3 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <textarea name="address" rows="3"
                          placeholder="Restaurant Address"
                          class="w-full border px-4 py-3 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none"></textarea>
            </div>
        </div>

        <!-- DIVIDER -->
        <div class="border-t pt-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4">
                Admin Account
            </h3>

            <div class="space-y-4">
                <input name="email" type="email" required
                       placeholder="Admin Email"
                       class="w-full border px-4 py-3 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">

                <input name="password" type="password" required
                       placeholder="Password"
                       class="w-full border px-4 py-3 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
        </div>

        <!-- CTA -->
        <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700
                       text-white py-4 rounded-xl font-bold text-lg transition active:scale-95">
            Create Account & Start Ordering
        </button>

    </form>

    <!-- FOOTER -->
    <p class="text-center text-sm text-gray-400 mt-6">
        Already have an account?
        <a href="/login" class="text-emerald-600 font-semibold hover:underline">
            Login
        </a>
    </p>

</div>

</body>
</html>
