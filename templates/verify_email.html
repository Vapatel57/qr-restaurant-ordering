<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Verification | QR-Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">

    <!-- HEADER -->
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-emerald-100 text-emerald-600 
                    rounded-full flex items-center justify-center 
                    mx-auto mb-4 text-2xl font-bold">
            📧
        </div>

        <h2 class="text-2xl font-black text-gray-900">
            Verify Your Email
        </h2>

        <p class="text-sm text-gray-500 mt-2">
            Enter the 6-digit code sent to your email
        </p>
    </div>

    <!-- ERROR -->
    {% if error %}
    <div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm font-semibold text-center">
        {{ error }}
    </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST" class="space-y-5">

        <input
            type="text"
            name="otp"
            maxlength="6"
            inputmode="numeric"
            pattern="[0-9]*"
            required
            placeholder="000000"
            class="w-full text-center text-2xl tracking-widest
                   border px-4 py-4 rounded-xl
                   focus:ring-2 focus:ring-emerald-500
                   outline-none font-bold"
        />

        <button
            type="submit"
            class="w-full bg-emerald-600 hover:bg-emerald-700
                   text-white py-3 rounded-xl font-bold text-lg
                   transition active:scale-95">
            Verify & Continue
        </button>

    </form>

    <!-- FOOTER -->
    <div class="text-center mt-6 text-sm text-gray-500">
        <p>Code expires in <strong>10 minutes</strong></p>

        <p class="mt-2">
            Didn’t receive the code?
            <a href="/resend-otp"
               class="text-emerald-600 font-semibold hover:underline">
               Resend
            </a>
        </p>
    </div>

</div>

</body>
</html>
